name: Build haydn kernel with DroidSpaces support

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev make libncurses-dev libelf-dev python3

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b lineage-22.2 https://github.com/LineageOS/android_kernel_xiaomi_sm8350.git kernel

      - name: Clone AOSP build system
        run: |
          cd kernel
          git clone --depth=1 https://android.googlesource.com/kernel/build build

      - name: Download clang r536225
        run: |
          mkdir -p toolchain
          curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r536225.tar.gz" -o clang.tar.gz
          tar -xzf clang.tar.gz -C toolchain/
          ls toolchain/bin/clang

      - name: Download GCC toolchains
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 toolchain/gcc-aarch64
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 toolchain/gcc-arm

      - name: Create compiler symlinks
        run: |
          for t in gcc ar ld nm objcopy strip ranlib; do
            if [ -f toolchain/gcc-aarch64/bin/aarch64-linux-android-$t ]; then
              ln -sf aarch64-linux-android-$t toolchain/gcc-aarch64/bin/aarch64-linux-gnu-$t
            fi
          done
          for t in gcc ar ld nm objcopy strip ranlib; do
            if [ -f toolchain/gcc-arm/bin/arm-linux-androideabi-$t ]; then
              ln -sf arm-linux-androideabi-$t toolchain/gcc-arm/bin/arm-linux-gnueabi-$t
            fi
          done
          toolchain/gcc-aarch64/bin/aarch64-linux-gnu-gcc --version | head -1

      - name: Generate defconfig
        run: |
          cd kernel
          export PATH="$PWD/../toolchain/bin:$PWD/../toolchain/gcc-aarch64/bin:$PWD/../toolchain/gcc-arm/bin:$PATH"
          mkdir -p out
          scripts/gki/generate_defconfig.sh vendor/lahaina-qgki_defconfig
          make O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_COMPAT=arm-linux-gnueabi- CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 vendor/lahaina-qgki_defconfig

      - name: Add DroidSpaces configs and fix linker issues
        run: |
          cd kernel
          # Add DroidSpaces configs
          sed -i 's/# CONFIG_PID_NS is not set/CONFIG_PID_NS=y/' out/.config
          sed -i 's/# CONFIG_IPC_NS is not set/CONFIG_IPC_NS=y/' out/.config
          sed -i 's/# CONFIG_SYSVIPC is not set/CONFIG_SYSVIPC=y/' out/.config
          sed -i 's/# CONFIG_POSIX_MQUEUE is not set/CONFIG_POSIX_MQUEUE=y/' out/.config
          sed -i 's/# CONFIG_DEVTMPFS is not set/CONFIG_DEVTMPFS=y/' out/.config
          sed -i 's/# CONFIG_NETFILTER_XT_MATCH_ADDRTYPE is not set/CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y/' out/.config
          # Disable proprietary drivers that cause linker errors
          sed -i 's/CONFIG_CNSS2=y/# CONFIG_CNSS2 is not set/' out/.config
          sed -i 's/CONFIG_ICNSS2=y/# CONFIG_ICNSS2 is not set/' out/.config
          sed -i 's/CONFIG_QTI_BATTERY_CHARGER=y/# CONFIG_QTI_BATTERY_CHARGER is not set/' out/.config
          sed -i 's/CONFIG_BACKLIGHT_QCOM_SPMI_WLED=y/# CONFIG_BACKLIGHT_QCOM_SPMI_WLED is not set/' out/.config
          sed -i 's/CONFIG_LEDS_QTI_FLASH=y/# CONFIG_LEDS_QTI_FLASH is not set/' out/.config
          sed -i 's/CONFIG_MI_HARDWARE_ID=m/# CONFIG_MI_HARDWARE_ID is not set/' out/.config
          sed -i 's/CONFIG_MI_DISP=y/# CONFIG_MI_DISP is not set/' out/.config

      - name: Apply kABI patches
        run: |
          cd kernel
          # Download and apply kABI patches
          curl -sL "https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/main/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch" -o /tmp/p1.patch
          curl -sL "https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/main/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/002.5.10_or_lower_use_android_abi_padding_for_posix_mqueue.patch" -o /tmp/p2.patch
          git apply --check /tmp/p1.patch 2>&1 || echo "Patch 1 may not apply cleanly, trying manual..."
          git apply /tmp/p1.patch 2>&1 || echo "Patch 1 failed, applying manually..."
          git apply --check /tmp/p2.patch 2>&1 || echo "Patch 2 may not apply cleanly, trying manual..."
          git apply /tmp/p2.patch 2>&1 || echo "Patch 2 failed, applying manually..."

      - name: Build kernel
        run: |
          cd kernel
          export PATH="$PWD/../toolchain/bin:$PWD/../toolchain/gcc-aarch64/bin:$PWD/../toolchain/gcc-arm/bin:$PATH"
          make O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_COMPAT=arm-linux-gnueabi- CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 KCFLAGS="-Wno-error" Image

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image
          path: kernel/out/arch/arm64/boot/Image

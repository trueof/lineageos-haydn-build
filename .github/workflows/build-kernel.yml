name: Build haydn kernel with DroidSpaces support

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev make libncurses-dev libelf-dev python3

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b lineage-22.2 https://github.com/LineageOS/android_kernel_xiaomi_sm8350.git kernel

      - name: Clone AOSP build system
        run: |
          cd kernel
          git clone --depth=1 https://android.googlesource.com/kernel/build build

      - name: Download clang r536225
        run: |
          mkdir -p toolchain
          git clone --depth=1 https://github.com/nicofontana/android_prebuilts_clang_host_linux-x86_clang-r536225.git toolchain/clang-r536225 || \
          git clone --depth=1 https://github.com/nicofontana/android_prebuilts_clang_host_linux-x86_clang-r536225.git toolchain/clang-r536225
          mv toolchain/clang-r536225/* toolchain/ 2>/dev/null || true
          ls toolchain/bin/clang

      - name: Download GCC toolchains
        run: |
          git clone --depth=1 https://github.com/nicofontana/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git toolchain/gcc-aarch64 || \
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 toolchain/gcc-aarch64
          git clone --depth=1 https://github.com/nicofontana/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git toolchain/gcc-arm || \
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 toolchain/gcc-arm

      - name: Create compiler symlinks
        run: |
          set -eux
          for src_triple in aarch64-linux-android aarch64-linux-gnu; do
            for t in gcc ar ld nm objcopy strip ranlib; do
              src="toolchain/gcc-aarch64/bin/aarch64-linux-android-$t"
              if [ -f "$src" ]; then
                ln -sf "$(basename "$src")" "toolchain/gcc-aarch64/bin/$src_triple-$t"
              fi
            done
          done
          for src_triple in arm-linux-androideabi arm-linux-gnueabi; do
            for t in gcc ar ld nm objcopy strip ranlib; do
              src="toolchain/gcc-arm/bin/arm-linux-androideabi-$t"
              if [ -f "$src" ]; then
                ln -sf "$(basename "$src")" "toolchain/gcc-arm/bin/$src_triple-$t"
              fi
            done
          done
          ln -sf ld.lld toolchain/bin/aarch64-linux-android-ld.lld
          toolchain/gcc-aarch64/bin/aarch64-linux-gnu-gcc --version | head -1 || true
          toolchain/bin/clang --version | head -1

      - name: Generate defconfig
        run: |
          cd kernel
          export PATH="$PWD/../toolchain/bin:$PWD/../toolchain/gcc-aarch64/bin:$PWD/../toolchain/gcc-arm/bin:$PATH"
          mkdir -p out
          scripts/gki/generate_defconfig.sh vendor/lahaina-qgki_defconfig
          make O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_COMPAT=arm-linux-gnueabi- CLANG_TRIPLE=aarch64-linux-android- LLVM=1 LLVM_IAS=1 vendor/lahaina-qgki_defconfig

      - name: Apply kABI patches
        run: |
          cd kernel
          python3 /home/runner/work/lineageos-haydn-build/lineageos-haydn-build/apply_patches.py

      - name: Add DroidSpaces configs
        run: |
          cd kernel
          sed -i 's/# CONFIG_PID_NS is not set/CONFIG_PID_NS=y/' out/.config
          sed -i 's/# CONFIG_IPC_NS is not set/CONFIG_IPC_NS=y/' out/.config
          sed -i 's/# CONFIG_SYSVIPC is not set/CONFIG_SYSVIPC=y/' out/.config
          sed -i 's/# CONFIG_POSIX_MQUEUE is not set/CONFIG_POSIX_MQUEUE=y/' out/.config
          sed -i 's/# CONFIG_DEVTMPFS is not set/CONFIG_DEVTMPFS=y/' out/.config
          sed -i 's/# CONFIG_NETFILTER_XT_MATCH_ADDRTYPE is not set/CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y/' out/.config
          sed -i 's/CONFIG_CNSS2=y/# CONFIG_CNSS2 is not set/' out/.config
          sed -i 's/CONFIG_ICNSS2=y/# CONFIG_ICNSS2 is not set/' out/.config
          sed -i 's/CONFIG_QTI_BATTERY_CHARGER=y/# CONFIG_QTI_BATTERY_CHARGER is not set/' out/.config
          sed -i 's/CONFIG_BACKLIGHT_QCOM_SPMI_WLED=y/# CONFIG_BACKLIGHT_QCOM_SPMI_WLED is not set/' out/.config
          sed -i 's/CONFIG_LEDS_QTI_FLASH=y/# CONFIG_LEDS_QTI_FLASH is not set/' out/.config
          sed -i 's/CONFIG_MI_HARDWARE_ID=m/# CONFIG_MI_HARDWARE_ID is not set/' out/.config
          sed -i 's/CONFIG_MI_DISP=y/# CONFIG_MI_DISP is not set/' out/.config
          echo "=== DroidSpaces configs ==="
          grep -E "PID_NS=|IPC_NS=|SYSVIPC=|POSIX_MQUEUE=|DEVTMPFS=" out/.config | grep -v "^#"

      - name: Build kernel
        run: |
          cd kernel
          export PATH="$PWD/../toolchain/bin:$PWD/../toolchain/gcc-aarch64/bin:$PWD/../toolchain/gcc-arm/bin:$PATH"
          make O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_COMPAT=arm-linux-gnueabi- CLANG_TRIPLE=aarch64-linux-android- LLVM=1 LLVM_IAS=1 KCFLAGS="-Wno-error" Image

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image
          path: kernel/out/arch/arm64/boot/Image
